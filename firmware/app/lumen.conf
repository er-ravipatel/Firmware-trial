# lumen.conf — Lumen Frame configuration
# Copy this file to the root of the SD card. It is read once at boot.
# Format: one "key = value" per line. '#' starts a comment. Unknown keys are ignored.
# If this file is absent, all developer diagnostics default to OFF (production behaviour).

# Capture a diagnostic log to SD:/lumenlog.txt (boot steps, per-photo timings, perf, faults).
# Costs an SD write (f_sync) per line, so keep it OFF on shipped frames and ON only when
# debugging. Accepts: on/off, 1/0, true/false, yes/no.
logging = off
